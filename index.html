<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTUPARTS - Sitio en construcción</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.03) 1px, transparent 1px),
                              radial-gradient(circle at 80% 70%, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px, 80px 80px;
            pointer-events: none;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px 30px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(to right, #e94560, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .construction-icon {
            font-size: 3rem;
            margin: 15px 0;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }

        .badge {
            display: inline-block;
            background: #e94560;
            color: white;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 1rem;
            letter-spacing: 2px;
            margin: 15px 0 20px;
            animation: glow 1.5s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 5px #e94560, 0 0 10px #e94560; }
            to { box-shadow: 0 0 20px #e94560, 0 0 40px #e94560; }
        }

        .message {
            color: #d1d1e9;
            font-size: 1.1rem;
            line-height: 1.6;
            margin: 20px 0 30px;
        }

        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #25D366;
            color: white;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 15px 25px;
            border-radius: 50px;
            transition: all 0.3s ease;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4);
            margin: 10px 0 20px;
            animation: fadeInUp 1.2s ease-out;
        }

        .whatsapp-btn:hover {
            background: #1ebe5c;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.6);
        }

        .whatsapp-btn svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .official-number {
            color: #a3a3c2;
            font-size: 0.9rem;
            margin-top: 15px;
            font-style: italic;
        }

        .website-link {
            color: #f39c12;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            display: inline-block;
            margin-top: 25px;
            border-bottom: 2px solid transparent;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .website-link:hover {
            border-bottom-color: #f39c12;
            color: #f1c40f;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
                border-radius: 20px;
            }
            .logo {
                font-size: 2.2rem;
                letter-spacing: 2px;
            }
            .badge {
                font-size: 0.9rem;
                padding: 6px 18px;
            }
            .whatsapp-btn {
                font-size: 1rem;
                padding: 12px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="construction-icon"></div>

        
        <h1 class="logo">ASTUPARTS</h1>

        <div class="badge">ESTE SITIO ESTÁ BAJO CONSTRUCCIÓN</div>

        <p class="message">
            ESTAMOS TRABAJANDO PARA BRINDARTE<br>
            UNA MEJOR EXPERIENCIA.
        </p>

    </div>
</body>
</html>
